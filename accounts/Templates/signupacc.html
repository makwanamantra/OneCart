{% extends 'base.html' %}

{% block content %}

<section class="min-h-screen flex items-center justify-center 
                bg-gradient-to-br from-cyan-100 via-white to-indigo-100 px-4">

    <!-- Signup Card -->
    <div class="w-full max-w-lg rounded-3xl 
                bg-white/80 backdrop-blur-xl
                border border-white
                shadow-2xl p-10">

        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="h-16 w-16 flex items-center justify-center 
                        rounded-2xl bg-cyan-600 text-white text-3xl shadow-lg">
                🛒
            </div>
        </div>


        <!-- Title -->
        <div class="text-center mb-8">

            <h1 class="text-4xl font-extrabold text-slate-900">
                Create Account
            </h1>

            <p class="mt-3 text-slate-500">
                Join our store and enjoy exclusive offers
            </p>

        </div>


        <!-- Error Message -->
        {% if error %}

        <div class="mb-6 flex items-center gap-3 rounded-xl 
                    bg-red-50 border border-red-200
                    px-4 py-3 text-red-600">

            <span>⚠️</span>
            {{ error }}

        </div>

        {% endif %}



        <form method="POST" class="space-y-6">

            {% csrf_token %}


            <!-- Username -->
            <div>

                <label class="block mb-2 text-sm font-semibold text-slate-700">
                    Username
                </label>

                <div class="relative">

                    <span class="absolute left-4 top-3 text-slate-400">
                        👤
                    </span>

                    <input 
                    type="text"
                    name="username"
                    placeholder="Enter username"
                    class="w-full rounded-xl border border-slate-300 
                           bg-white px-12 py-3
                           outline-none
                           focus:border-cyan-500
                           focus:ring-4 focus:ring-cyan-100">

                </div>

            </div>



            <!-- Password -->
            <div>

                <label class="block mb-2 text-sm font-semibold text-slate-700">
                    Password
                </label>

                <input
                type="password"
                name="password1"
                placeholder="Create password"
                class="w-full rounded-xl border border-slate-300
                       px-4 py-3
                       outline-none
                       focus:border-cyan-500
                       focus:ring-4 focus:ring-cyan-100">

            </div>




            <!-- Confirm Password -->
            <div>

                <label class="block mb-2 text-sm font-semibold text-slate-700">
                    Confirm Password
                </label>


                <input
                type="password"
                name="password2"
                placeholder="Confirm password"
                class="w-full rounded-xl border border-slate-300
                       px-4 py-3
                       outline-none
                       focus:border-cyan-500
                       focus:ring-4 focus:ring-cyan-100">

            </div>



            <!-- Terms -->
            <div class="flex items-center gap-2">

                <input type="checkbox"
                class="h-4 w-4 rounded text-cyan-600">

                <p class="text-sm text-slate-500">
                    I agree to the 
                    <a href="#" class="text-cyan-600 font-medium">
                        Terms & Conditions
                    </a>
                </p>

            </div>



            <!-- Button -->
            <button
            type="submit"
            class="w-full rounded-xl 
                   bg-gradient-to-r from-cyan-600 to-blue-600
                   py-3.5
                   font-bold text-white
                   shadow-lg
                   transition
                   hover:scale-[1.02]
                   hover:shadow-xl">

                Create Account

            </button>


        </form>



        <!-- Login Link -->
        <p class="mt-8 text-center text-sm text-slate-500">

            Already have an account?

            <a href="{% url 'login' %}"
            class="font-bold text-cyan-600 hover:text-cyan-700">

                Login

            </a>

        </p>


    </div>

</section>


{% endblock content %}
