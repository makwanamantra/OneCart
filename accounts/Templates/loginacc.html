{% extends 'base.html' %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-white to-cyan-50 px-4">

    <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-xl border border-slate-200">

        <!-- Heading -->
        <div class="mb-8 text-center">
            <h2 class="text-3xl font-bold text-slate-900">
                Create Account
            </h2>
            <p class="mt-2 text-slate-500">
                Fill in your details to continue
            </p>
        </div>


        <form method="POST" class="space-y-5">

            {% csrf_token %}

            <div class="space-y-4">

                {{ form.as_p }}

            </div>


            <button
                type="submit"
                class="w-full rounded-xl bg-cyan-600 px-5 py-3
                       font-semibold text-white
                       transition duration-300
                       hover:bg-cyan-700
                       focus:ring-4 focus:ring-cyan-200">
                Submit
            </button>

        </form>


        <p class="mt-6 text-center text-sm text-slate-500">
            Already have an account?
            <a href="{% url 'signup'%}" class="font-semibold text-cyan-600 hover:text-cyan-700">
                Signup
            </a>
        </p>

    </div>

</div>

{% endblock content %}
